<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>TubeScan PRO</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTE -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- ESTILO -->
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
      color: #0f172a;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #0284c7;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      background: #ffffff;
      padding: 10px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .search-box input {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: transparent;
      outline: none;
      font-size: 16px;
    }

    .search-box button {
      padding: 15px 25px;
      border-radius: 10px;
      border: none;
      background: #0ea5e9;
      color: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      transition: 0.3s;
    }

    .search-box button:hover {
      background: #0284c7;
    }

    .results {
      margin-top: 20px;
    }

    .card {
      display: flex;
      gap: 15px;
      background: #ffffff;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card img {
      width: 180px;
      border-radius: 10px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .card a {
      color: #0ea5e9;
      text-decoration: none;
      font-weight: 600;
    }

    .card a:hover {
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      margin-top: 50px;
      opacity: 0.6;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 13px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="topbar">
      <div class="logo">🚀 TubeScan PRO</div>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar vídeos... ex: música relaxante, viral, lo-fi">
      <button onclick="buscar()">Buscar</button>
    </div>

    <div id="results" class="results"></div>

    <div class="footer">
      Powered by TubeScan PRO
    </div>

  </div>

  <script>
    async function buscar() {
      const query = document.getElementById("searchInput").value;

      if (!query) {
        alert("Digite algo para buscar!");
        return;
      }

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "🔎 Buscando...";

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (!data || data.length === 0) {
          resultsDiv.innerHTML = "<div class='empty'>Nenhum resultado encontrado</div>";
          return;
        }

        resultsDiv.innerHTML = "";

        data.forEach(video => {
          const title = video.snippet.title;
          const thumb = video.snippet.thumbnails.medium.url;
          const videoId = video.id.videoId;

          const card = `
            <div class="card">
              <img src="${thumb}">
              <div>
                <h3>${title}</h3>
                <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank">
                  ▶ Assistir vídeo
                </a>
              </div>
            </div>
          `;

          resultsDiv.innerHTML += card;
        });

      } catch (error) {
        resultsDiv.innerHTML = "Erro ao buscar.";
      }
    }
  </script>

</body>
</html>
