<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TubeScan PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#06080f;
  color:#fff;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid #111827;
}
.logo{
  font-size:22px;
  font-weight:700;
  color:#ff2d9a;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* SEARCH */
.search-main{
  margin-bottom:20px;
}

.search-main input{
  width:100%;
  padding:16px;
  border-radius:12px;
  background:#0f1424;
  border:1px solid #1f2a44;
  color:#fff;
  font-size:15px;
}

/* FILTERS CARD */
.filters{
  background:#0b0f1c;
  border:1px solid #1f2a44;
  border-radius:16px;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-bottom:20px;
}

.fg label{
  font-size:11px;
  color:#9aa4bf;
  display:block;
  margin-bottom:6px;
}

.fg input,
.fg select{
  width:100%;
  padding:12px;
  border-radius:10px;
  background:#0f1424;
  border:1px solid #1f2a44;
  color:#fff;
}

/* SECTION TITLE */
.section-title{
  grid-column:1/-1;
  font-size:12px;
  color:#ff2d9a;
  font-weight:600;
  margin-top:10px;
}

/* BUTTONS */
.actions{
  grid-column:1/-1;
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn-primary{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ff2d9a,#d91d8d);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.btn-primary:hover{
  opacity:0.9;
}

.btn-ghost{
  padding:14px;
  border-radius:12px;
  border:1px solid #1f2a44;
  background:#0f1424;
  color:#fff;
  cursor:pointer;
}

/* RESULTS */
.results{
  margin-top:20px;
}

.card{
  display:flex;
  gap:15px;
  background:#0f1424;
  border:1px solid #1f2a44;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
  border-color:#ff2d9a;
}

.card img{
  width:160px;
  border-radius:10px;
}

.card h3{
  margin:0 0 8px 0;
  font-size:15px;
}

.card a{
  color:#ff2d9a;
  text-decoration:none;
}

.empty{
  text-align:center;
  margin-top:40px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🚀 TubeScan PRO</div>
</div>

<div class="container">

  <!-- BUSCA -->
  <div class="search-main">
    <input type="text" id="q" placeholder="Ex: música relaxante, ganhar dinheiro, IA...">
  </div>

  <!-- FILTROS -->
  <div class="filters">

    <div class="fg">
      <label>Idioma</label>
      <select id="lang">
        <option value="all">Todos</option>
        <option value="pt">Português</option>
        <option value="en">Inglês</option>
      </select>
    </div>

    <div class="fg">
      <label>País</label>
      <select id="country">
        <option value="all">Todos</option>
        <option value="BR">Brasil</option>
        <option value="US">EUA</option>
      </select>
    </div>

    <div class="fg">
      <label>Data inicial</label>
      <input type="date" id="dateFrom">
    </div>

    <div class="fg">
      <label>Data final</label>
      <input type="date" id="dateTo">
    </div>

    <div class="fg">
      <label>Views mínimas</label>
      <input type="number" id="minViews" value="0">
    </div>

    <div class="fg">
      <label>Likes mínimas</label>
      <input type="number" id="minLikes" value="0">
    </div>

    <div class="fg">
      <label>Inscritos mín.</label>
      <input type="number" id="minSubs" value="0">
    </div>

    <div class="fg">
      <label>Inscritos máx.</label>
      <input type="number" id="maxSubs" placeholder="Sem limite">
    </div>

    <div class="section-title">📺 Canal</div>

    <div class="fg">
      <label>Criado após</label>
      <input type="date" id="chAfter">
    </div>

    <div class="fg">
      <label>Criado antes</label>
      <input type="date" id="chBefore">
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="buscar()">Buscar Vídeos</button>
      <button class="btn-ghost" onclick="clearPeriod()">Limpar</button>
    </div>

  </div>

  <!-- RESULTADOS -->
  <div id="results" class="results"></div>

</div>

<script>
async function buscar(){
  const query=document.getElementById("q").value;

  if(!query){
    alert("Digite algo");
    return;
  }

  const resultsDiv=document.getElementById("results");
  resultsDiv.innerHTML="Buscando...";

  try{
    const res=await fetch(`/api/search?q=${encodeURIComponent(query)}`);
    const data=await res.json();

    if(!data.results || data.results.length===0){
      resultsDiv.innerHTML="<div class='empty'>Nenhum resultado</div>";
      return;
    }

    resultsDiv.innerHTML="";

    data.results.forEach(v=>{
      resultsDiv.innerHTML+=`
        <div class="card">
          <img src="${v.thumbnail}">
          <div>
            <h3>${v.title}</h3>
            <a href="https://youtube.com/watch?v=${v.videoId}" target="_blank">Assistir</a>
          </div>
        </div>
      `;
    });

  }catch(e){
    resultsDiv.innerHTML="Erro";
  }
}

function clearPeriod(){
  document.getElementById("dateFrom").value="";
  document.getElementById("dateTo").value="";
}
</script>

</body>
</html>
