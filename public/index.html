<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TubeScan PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #e0f2fe, #f8fafc);
  color: #0f172a;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.logo {
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  color: #0284c7;
  margin-bottom: 30px;
}

.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
  background: #fff;
  padding: 10px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.search-box input {
  flex: 1;
  padding: 15px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

.search-box button {
  padding: 15px 25px;
  border-radius: 10px;
  border: none;
  background: #0ea5e9;
  color: white;
  cursor: pointer;
  font-weight: 600;
}

.search-box button:hover {
  background: #0284c7;
}

.card {
  display: flex;
  gap: 15px;
  background: #fff;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.card img {
  width: 180px;
  border-radius: 10px;
}

.card h3 {
  margin: 0 0 10px;
  font-size: 17px;
}

.card a {
  color: #0ea5e9;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 TubeScan PRO</div>

<div class="search-box">
<input id="searchInput" placeholder="Buscar vídeos... ex: música, viral, lo-fi">
<button onclick="buscar()">Buscar</button>
</div>

<div id="results"></div>

</div>

<script>
async function buscar(){
  const q = document.getElementById("searchInput").value;
  if(!q){alert("Digite algo");return;}

  const resDiv = document.getElementById("results");
  resDiv.innerHTML = "🔎 Buscando...";

  try{
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();

    resDiv.innerHTML = "";

    data.forEach(v=>{
      const card = `
      <div class="card">
        <img src="${v.snippet.thumbnails.medium.url}">
        <div>
          <h3>${v.snippet.title}</h3>
          <a href="https://youtube.com/watch?v=${v.id.videoId}" target="_blank">▶ Assistir</a>
        </div>
      </div>`;
      resDiv.innerHTML += card;
    });

  }catch{
    resDiv.innerHTML = "Erro";
  }
}
</script>

</body>
</html>
