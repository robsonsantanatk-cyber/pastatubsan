<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TubeScan PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #fff;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
  font-size: 24px;
  font-weight: 700;
  color: #ff2d9a;
}

nav a {
  margin-left: 15px;
  color: #aaa;
  text-decoration: none;
}

nav a.active {
  background: linear-gradient(135deg, #ff2d9a, #ff007a);
  padding: 6px 12px;
  border-radius: 8px;
  color: #fff;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* BUSCA */
.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input, select {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  border-radius: 10px;
  padding: 12px;
}

input:focus, select:focus {
  border: 1px solid #ff2d9a;
  box-shadow: 0 0 10px rgba(255,45,154,0.4);
}

/* BOTÕES */
button {
  background: linear-gradient(135deg, #ff2d9a, #ff007a);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-weight: bold;
  padding: 12px 20px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255,0,122,0.5);
}

/* FILTROS */
.filtros, .box {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* CARDS */
.card {
  display: flex;
  gap: 15px;
  background: rgba(255,255,255,0.04);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card img {
  width: 180px;
  border-radius: 10px;
}

.card a {
  color: #ff2d9a;
  text-decoration: none;
}

</style>
</head>

<body>

<header>
  <div class="logo">🚀 TubeScan PRO</div>
  <nav>
    <a class="active">Busca</a>
    <a>Analisar</a>
    <a>Favoritos</a>
  </nav>
</header>

<div class="container">

<!-- BUSCA -->
<div class="search-box">
  <input id="searchInput" placeholder="Buscar vídeos...">
  <button onclick="buscar()">Buscar Vídeos</button>
</div>

<!-- FILTROS (SEUS FILTROS CONTINUAM AQUI) -->
<div class="filtros">
  🔎 Seus filtros continuam aqui sem alteração
</div>

<!-- RESULTADOS -->
<div id="results"></div>

</div>

<script>
async function buscar(){
  const q = document.getElementById("searchInput").value;
  if(!q){alert("Digite algo");return;}

  const resDiv = document.getElementById("results");
  resDiv.innerHTML = "🔎 Buscando...";

  try{
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();

    resDiv.innerHTML = "";

    data.forEach(v=>{
      const card = `
      <div class="card">
        <img src="${v.snippet.thumbnails.medium.url}">
        <div>
          <h3>${v.snippet.title}</h3>
          <a href="https://youtube.com/watch?v=${v.id.videoId}" target="_blank">▶ Assistir</a>
        </div>
      </div>`;
      resDiv.innerHTML += card;
    });

  }catch{
    resDiv.innerHTML = "Erro ao buscar";
  }
}
</script>

</body>
</html>
